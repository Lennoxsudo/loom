<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loom</title>
    <style>
      html, body {
        background-color: #1e1e1e;
        color: #f6f6f6;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      /* 加载占位：React 挂载前显示，挂载后由 React 替换 #root 内容 */
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100vw;
        height: 100vh;
      }
      #root:empty::after {
        content: '';
        width: 28px;
        height: 28px;
        border: 3px solid #454545;
        border-top-color: #007acc;
        border-radius: 50%;
        animation: _splash_spin 0.8s linear infinite;
      }
      @keyframes _splash_spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
